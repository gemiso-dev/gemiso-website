name: CI (build check)

# main / develop 로 들어가는 PR에서 빌드가 깨지지 않는지 검증
on:
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      # base path 없이(운영=Cloudflare와 동일 조건) 빌드 검증
      - name: Build
        run: npm run build
